# Phase 2 sample: sync an OpenBao kv-v2 secret into a native K8s Secret via VSO, and consume it.
#
# Prereqs:
#   - VSO installed (deploy/vso/README.md)
#   - kubernetes auth enabled in OpenBao with a role "payments-api-app" bound to this SA
#     (Terraform: enable_kubernetes_auth=true; k8s_workloads add an entry)
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payments-api
  namespace: payments
---
# Self-contained connection in the app namespace (avoids relying on VSO cross-namespace
# defaults). For a centralized alternative, see deploy/vso/vault-connection.yaml.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultConnection
metadata:
  name: openbao
  namespace: payments
spec:
  address: https://openbao.secret-vault.svc:8200
  caCertSecretRef: openbao-ca       # CA bundle Secret in the payments namespace
  skipTLSVerify: false
---
# Tells VSO how to authenticate to OpenBao for this namespace.
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultAuth
metadata:
  name: payments-api
  namespace: payments
spec:
  vaultConnectionRef: openbao
  method: kubernetes
  mount: kubernetes                 # auth mount in OpenBao
  kubernetes:
    role: payments-api-app          # vault_kubernetes_auth_backend_role name
    serviceAccount: payments-api
---
# Materializes kv/payments/payments-api into a Secret named "payments-api-db".
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: payments-api-db
  namespace: payments
spec:
  type: kv-v2
  mount: kv/payments
  path: payments-api
  refreshAfter: 60s                 # poll for changes
  vaultAuthRef: payments-api
  destination:
    name: payments-api-db           # the K8s Secret VSO creates/keeps in sync
    create: true
---
# Sample workload consuming the synced Secret as env vars.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payments-api
  namespace: payments
spec:
  replicas: 1
  selector:
    matchLabels: { app: payments-api }
  template:
    metadata:
      labels: { app: payments-api }
    spec:
      serviceAccountName: payments-api
      containers:
        - name: app
          image: registry.example.com/payments/payments-api:latest
          envFrom:
            - secretRef:
                name: payments-api-db
